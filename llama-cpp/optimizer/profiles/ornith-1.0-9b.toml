# Balanced recommendation weights. These six sum to exactly 1.0.
[recommendation]
prompt_throughput_weight = 0.20
generation_throughput_weight = 0.30
ttft_p95_weight = 0.15
request_latency_p95_weight = 0.15
quality_margin_weight = 0.15
vram_headroom_weight = 0.05

# Quality policy: screening-only validation is permitted without calibrated
# thresholds, but the finalist recommendation stays typed "blocked" until the
# identity-bound reference calibration exists.
[quality]
recommendation_status = "blocked"
reason = "reference calibration not yet measured"

# Bounded screening/search dimensions. Each dimension is finite and bounded;
# the native Cartesian product (108) stays under max_native_combinations (128).
# ubatch <= batch is enforced by the applicability checker.
[search]
max_native_combinations = 128
kv_cache_types = [{ value = "f16" }, { value = "q8_0" }, { value = "q4_0" }]
flash_attention = { values = [true, false] }
threads = { values = [16] }

[search.gpu_layers]
min = 60
max = 99
step = 39

[search.batch]
values = [512, 1024, 2048]

[search.ubatch]
values = [128, 256, 512]
