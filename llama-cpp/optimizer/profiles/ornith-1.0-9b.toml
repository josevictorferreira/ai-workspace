# Q5_K_M, Q6_K, and Q8_0 are the search candidates; BF16 is an optional
# high-precision reference/source only. Every candidate URL pins the immutable
# Hugging Face revision and records the publisher LFS SHA-256 (never a Nix SRI
# hash). Context is exactly 32768 and the total-device VRAM ceiling is exactly
# 13 GiB for this profile.

[profile]
id = "ornith-1.0-9b"
version = "1.0.0"
optimizer_version = "0.1.0"
context_size = 32768
vram_limit_bytes = 13958643712
